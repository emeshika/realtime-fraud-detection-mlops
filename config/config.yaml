data:
  raw_path: "data/raw/credit_card_fraud_10k.csv"
  processed_dir: "data/processed"
  test_size: 0.2
  val_size: 0.1
  random_state: 42

features:
  numerical:
    - "amount"
    - "transaction_hour"
    - "device_trust_score"
    - "velocity_last_24h"
    - "cardholder_age"
  categorical:
    - "merchant_category"
  binary:
    - "foreign_transaction"
    - "location_mismatch"
  target: "is_fraud"